<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yash Lad</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #B71C1C, #F44336);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      background: linear-gradient(to right, #FF9933, white, #138808);
      color: black;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
    }

    .tagline {
      font-size: 18px;
      font-weight: bold;
    }

    .profile {
      margin-top: 25px;
    }

    .profile img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 5px solid white;
    }

    .card {
      margin: 30px auto;
      width: 80%;
      max-width: 700px;
      padding: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
    }

    .quote {
      font-style: italic;
      font-size: 18px;
      margin-top: 10px;
      color: #FFD54F;
    }

    .projects {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .project {
      background: white;
      color: black;
      width: 220px;
      margin: 10px;
      padding: 15px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .project:hover {
      transform: scale(1.05);
    }

    .project img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      margin-top: 30px;
      padding: 15px;
      background: rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<header>
  <h1>Yash Lad 🇮🇳</h1>
  <p class="tagline">Proud Indian | Family First ❤️</p>
</header>

<div class="profile">
  <img src="https://via.placeholder.com/150" alt="Profile Photo">
</div>

<div class="card">
  <h2>My Interests</h2>
  <p>I love studying and spending time with my family.</p>
  <p class="quote">"My family is my strength and my country is my pride."</p>
</div>

<div class="card">
  <h2>My Projects</h2>

  <div class="projects">
    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>VR Headset</h3>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>Wind Propelled Car</h3>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>Neon LED Structure</h3>
    </div>
  </div>

</div>

<footer>
  <p>❤️ Dedicated to Family | 🇮🇳 Proud to be Indian</p>
</footer>

</body>
</html>
